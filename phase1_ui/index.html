<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZEATS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="header">
    <h1>ZEATS</h1>
    <div id="controls">
      <div id="category-panel">
        <span class="panel-label">区分選択：</span>
        <span class="help-icon" aria-label="操作説明">?<span class="help-tooltip">【区分ボタン】&#10;クリック：区分を選択&#10;ダブルクリック：色を変更&#10;&#10;【座席】&#10;クリック（空席）：選択中の区分を割り当て&#10;クリック（色あり）：割り当てを消去&#10;ドラッグ：複数席を一括塗り/消去&#10;Shift+クリック：最初と最後の間を一括塗り/消去</span></span>
        <div id="category-buttons"></div>
      </div>
      <div id="action-buttons">
        <div id="zoom-controls">
          <button id="btn-zoom-out" title="縮小">－</button>
          <span id="zoom-level">100%</span>
          <button id="btn-zoom-in" title="拡大">＋</button>
        </div>
        <button id="btn-undo" disabled>1つ戻る</button>
        <button id="btn-redo" disabled>1つ進む</button>
        <button id="btn-reset-all">白図面にする</button>
        <!-- Electron専用ボタン（window.zeatsAPI が存在する場合のみ表示） -->
        <span id="electron-buttons" style="display:none">
          <button id="btn-import-excel-direct">Excelを直接インポート</button>
          <input type="file" id="import-excel-direct-input" accept=".xlsx,.xls" style="display:none">
          <button id="btn-export-excel">Excel出力</button>
          <button id="btn-export-pdf">PDF出力</button>
        </span>
      </div>
    </div>
  </div>

  <!-- シートタブ（Excelインポート時に表示） -->
  <div id="sheet-tabs" class="hidden"></div>

  <div id="main">
    <!-- 左: 座席表示エリア -->
    <div id="layout-area">

      <!-- 未インポート時のプレースホルダー -->
      <div id="empty-state">
        <p>「Excelを直接インポート」からExcelファイルを読み込んでください</p>
      </div>

      <!-- 通常モード: グリッド（手動モード用・インポート後のみ使用） -->
      <div id="grid-mode" class="hidden">
        <div id="seat-grid"></div>
      </div>

      <!-- Excelインポートモード: ブロック検索 + カード -->
      <div id="block-mode" class="hidden">
        <div id="block-search-bar">
          <input type="text" id="block-search" placeholder="ブロック名で検索...">
          <span id="block-count-label"></span>
        </div>
        <div id="block-cards"></div>
      </div>

    </div>

    <!-- 右: サイドバー -->
    <div id="sidebar">
      <div id="summary-panel">
        <h2>集計</h2>
        <div id="summary-list"></div>
        <div id="total-count"></div>
      </div>
      <div id="ticket-panel">
        <h2>チケット番号</h2>
        <div id="ticket-format">
          <label>プレフィックス：<input type="text" id="ticket-prefix" value="A" maxlength="5"></label>
          <label>開始番号：<input type="number" id="ticket-start" value="1" min="1"></label>
        </div>
        <button id="btn-assign-tickets">番号を割り振る</button>
        <div id="ticket-preview"></div>
      </div>
    </div>
  </div>

  <div id="context-menu" class="hidden">
    <ul id="context-menu-list"></ul>
  </div>

  <div id="toast" class="hidden"></div>

  <script src="app.js"></script>
</body>
</html>
